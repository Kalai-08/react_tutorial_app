name: Deploy React App to GitHub Pages

on:  # it'll trigger when someone pushes the code to main branch
  push:
    branches:
      - main

permissions: #giving permissions to write in the repository
  contents: write

jobs:
  deploy:  # Runs this project on github free cloud server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code # Repo downloads code in that Linux server
        uses: actions/checkout@v4

      - name: Setup Node.js # Install Node.js in that server
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies # install dependencies mentioned in package.json
        run: npm install

      - name: Build project # build the React app and it will save it in dist file
        run: npm run build

      - name: Configure Git          # configure git to push the dist folder to gh-pages branch
        run: |
          git config --global user.email "kalaiblazer14@gmail.com"
          git config --global user.name "Kalai-08"

      - name: Deploy to GitHub Pages
        run: |
          npm install -g gh-pages
          gh-pages -d dist -r https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git